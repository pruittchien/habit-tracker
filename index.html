<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Habits">
<meta name="theme-color" content="#f5f4f0" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#18181a" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Habits</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #eeede9;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.15);
  --text: #1a1a18;
  --text2: #6b6b67;
  --text3: #a0a09c;
  --radius: 16px;
  --radius-sm: 10px;
  --nav-h: 56px;
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px);
  --sar: env(safe-area-inset-right, 0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #18181a; --surface: #242428; --surface2: #2e2e34;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.14);
    --text: #f0efeb; --text2: #9b9b97; --text3: #5e5e5a;
  }
}

html, body {
  height: 100%; overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  background: var(--bg); color: var(--text);
}

.view {
  display: none; position: absolute; inset: 0;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--nav-h) + var(--sab) + 12px);
  padding-left: var(--sal); padding-right: var(--sar);
}
.view.active { display: block; }

nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 0.5px solid var(--border2);
  display: flex; padding-bottom: var(--sab); z-index: 200;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
nav button {
  flex: 1; background: none; border: none; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 8px 0; color: var(--text3); font-size: 10px; font-weight: 500;
  height: var(--nav-h); letter-spacing: 0.2px; transition: color 0.15s;
}
nav button.active { color: var(--text); }
nav button .nav-icon { font-size: 24px; line-height: 1; }

.page-header {
  padding: calc(var(--sat) + 52px) 20px 14px;
  background: var(--surface); border-bottom: 0.5px solid var(--border);
  position: sticky; top: 0; z-index: 10;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.page-header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
.page-header .sub { font-size: 14px; color: var(--text2); margin-top: 3px; }

/* ── TODAY ── */
.today-header {
  padding: calc(var(--sat) + 14px) 16px 12px;
  background: var(--surface); border-bottom: 0.5px solid var(--border);
  position: sticky; top: 0; z-index: 10;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}

/* Quick entry */
.quick-entry-wrap {
  display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
}
.quick-entry {
  flex: 1; padding: 12px 14px;
  background: var(--surface2); border: 1.5px solid var(--border2);
  border-radius: 14px; font-size: 16px; color: var(--text);
  font-family: inherit; outline: none; appearance: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.quick-entry::placeholder { color: var(--text3); }
.quick-entry:focus { border-color: #4CAF50; box-shadow: 0 0 0 3px rgba(76,175,80,0.15); }
.quick-send {
  width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0;
  background: #4CAF50; border: none; cursor: pointer; font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.1s, opacity 0.15s;
}
.quick-send:active { transform: scale(0.92); }
.quick-send:disabled { opacity: 0.35; }

/* Match chips */
.match-chips {
  display: flex; flex-wrap: wrap; gap: 6px; min-height: 0;
  overflow: hidden; transition: max-height 0.2s;
}
.match-chip {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 11px; border-radius: 20px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: none; font-family: inherit;
  transition: transform 0.1s, opacity 0.15s;
}
.match-chip:active { transform: scale(0.95); }
.match-chip.queued { opacity: 0.45; text-decoration: line-through; }

/* Toast */
.toast {
  position: fixed; bottom: calc(var(--nav-h) + var(--sab) + 12px); left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--text); color: var(--bg);
  padding: 10px 18px; border-radius: 20px; font-size: 14px; font-weight: 600;
  opacity: 0; pointer-events: none; z-index: 300; white-space: nowrap;
  transition: opacity 0.2s, transform 0.2s;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Progress */
.progress-row { display: flex; align-items: center; gap: 10px; }
.progress-track { flex: 1; height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; background: #4CAF50; transition: width 0.35s cubic-bezier(0.34,1.56,0.64,1); }
.progress-label { font-size: 13px; font-weight: 600; color: var(--text2); min-width: 28px; text-align: right; }

.date-line { font-size: 13px; color: var(--text2); margin-bottom: 10px; }

.section-label {
  padding: 14px 20px 8px;
  font-size: 12px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.6px;
}

.habit-list { padding: 0 14px; display: flex; flex-direction: column; gap: 8px; }
.habit-item {
  background: var(--surface); border-radius: var(--radius);
  border: 1.5px solid var(--border); padding: 13px 14px;
  display: flex; align-items: center; gap: 12px; cursor: pointer;
  transition: transform 0.12s, border-color 0.2s, background 0.2s; position: relative;
}
.habit-item:active { transform: scale(0.975); }
.habit-item.done { border-color: var(--hc); background: color-mix(in srgb, var(--hc) 6%, var(--surface)); }
.habit-emoji {
  width: 40px; height: 40px; border-radius: 11px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 20px;
  background: color-mix(in srgb, var(--hc) 15%, var(--surface2));
}
.habit-item.done .habit-emoji { background: color-mix(in srgb, var(--hc) 22%, var(--surface2)); }
.habit-info { flex: 1; min-width: 0; }
.habit-name { font-size: 15px; font-weight: 600; }
.habit-desc { font-size: 12px; color: var(--text2); margin-top: 1px; }
.habit-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.streak { font-size: 12px; font-weight: 600; color: var(--text3); }
.streak.hot { color: var(--hc); }
.check-ring {
  width: 26px; height: 26px; border-radius: 50%;
  border: 2px solid var(--border2); display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: transparent; transition: all 0.2s;
}
.habit-item.done .check-ring { background: var(--hc); border-color: var(--hc); color: #fff; }

@keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.06)} 100%{transform:scale(1)} }
.habit-item.popping { animation: pop 0.22s ease; }

/* ── CALENDAR ── */
.cal-sticky {
  background: var(--surface); border-bottom: 0.5px solid var(--border);
  position: sticky; top: 0; z-index: 10;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  padding-top: var(--sat);
}
.cal-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 52px 20px 4px;
}
.cal-nav h1 { font-size: 24px; font-weight: 700; }
.cal-nav-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--surface2); border: none; cursor: pointer;
  font-size: 20px; color: var(--text); display: flex; align-items: center; justify-content: center;
}
.cal-nav-btn:active { background: var(--border2); }
.legend { display: flex; flex-wrap: wrap; gap: 6px 12px; padding: 8px 20px 10px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); font-weight: 500; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dow-row { display: grid; grid-template-columns: repeat(7,1fr); padding: 0 10px 6px; }
.dow { text-align: center; font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.3px; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); padding: 4px 10px 10px; gap: 3px; }
.cal-day {
  aspect-ratio: 1; border-radius: 10px;
  display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
  padding: 4px 2px 3px; cursor: pointer; position: relative;
}
.cal-day:active { background: var(--surface2); }
.cal-day.empty { pointer-events: none; }
.cal-day.future { opacity: 0.3; pointer-events: none; }
.day-num {
  font-size: 12px; font-weight: 600; color: var(--text2);
  width: 22px; height: 22px; line-height: 22px; text-align: center; border-radius: 50%;
}
.cal-day.today .day-num { background: var(--text); color: var(--bg); }
.day-dots { display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; margin-top: 2px; max-width: 38px; }
.dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

/* Sheet — used for both calendar detail AND day picker on today */
.sheet-backdrop {
  display: none; position: fixed; inset: 0; z-index: 150;
  background: rgba(0,0,0,0.35);
}
.sheet-backdrop.open { display: block; }
.sheet {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-radius: 20px 20px 0 0;
  padding: 12px 20px calc(24px + var(--sab));
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.34,1.1,0.64,1);
  max-height: 85vh; overflow-y: auto;
}
.sheet-backdrop.open .sheet { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 14px; }
.sheet-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
.sheet-subtitle { font-size: 13px; color: var(--text2); margin-bottom: 14px; }

/* Editable habit rows in sheet */
.sheet-habit-row {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px; border-radius: var(--radius-sm);
  margin-bottom: 7px; cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  border: 1.5px solid transparent;
}
.sheet-habit-row:active { transform: scale(0.97); }
.sheet-habit-row.done { border-color: var(--hc); background: color-mix(in srgb, var(--hc) 8%, var(--surface)); }
.sheet-habit-row .shr-emoji { font-size: 20px; width: 32px; text-align: center; }
.sheet-habit-row .shr-name { flex: 1; font-size: 15px; font-weight: 600; }
.sheet-habit-row .shr-check {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid var(--border2); display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: transparent; flex-shrink: 0; transition: all 0.2s;
}
.sheet-habit-row.done .shr-check { background: var(--hc); border-color: var(--hc); color: #fff; }

/* ── STATS ── */
.period-row { display: flex; gap: 8px; padding: 14px 16px 2px; }
.period-btn {
  padding: 7px 16px; border-radius: 20px; border: none; cursor: pointer;
  font-size: 13px; font-weight: 600; background: var(--surface2); color: var(--text2);
  font-family: inherit; transition: all 0.15s;
}
.period-btn.active { background: var(--text); color: var(--bg); }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px 16px 0; }
.stat-card { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 14px 16px; }
.stat-lbl { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.stat-val { font-size: 30px; font-weight: 700; line-height: 1; letter-spacing: -1px; }
.stat-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
.habit-stats { padding: 14px 16px 0; }
.hs-title { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }
.hs-row {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface); border-radius: var(--radius-sm);
  border: 0.5px solid var(--border); padding: 12px 14px; margin-bottom: 8px;
}
.hs-emoji { font-size: 20px; width: 28px; text-align: center; }
.hs-info { flex: 1; min-width: 0; }
.hs-name { font-size: 14px; font-weight: 600; }
.hs-bar-track { height: 4px; background: var(--surface2); border-radius: 2px; margin-top: 6px; overflow: hidden; }
.hs-bar { height: 100%; border-radius: 2px; transition: width 0.4s; }
.hs-pct { font-size: 14px; font-weight: 700; min-width: 36px; text-align: right; }

/* ── SETTINGS ── */
.settings-habits { padding: 0 14px; display: flex; flex-direction: column; gap: 8px; }
.sh-item {
  background: var(--surface); border-radius: var(--radius);
  border: 0.5px solid var(--border); padding: 13px 14px;
  display: flex; align-items: center; gap: 12px;
}
.sh-swatch { width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; }
.sh-text { flex: 1; min-width: 0; }
.sh-name { font-size: 15px; font-weight: 600; }
.sh-desc { font-size: 12px; color: var(--text2); }
.sh-keywords { font-size: 11px; color: var(--text3); margin-top: 2px; }
.sh-btns { display: flex; gap: 6px; }
.sh-btn {
  width: 30px; height: 30px; border-radius: 8px; border: none; cursor: pointer;
  background: var(--surface2); color: var(--text2); font-size: 13px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; font-family: inherit;
}
.sh-btn:active { background: var(--border2); }
.sh-btn.del { color: #e53935; }

.add-form {
  margin: 4px 14px 0;
  background: var(--surface); border-radius: var(--radius);
  border: 0.5px solid var(--border); padding: 16px;
}
.add-form h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
.form-field { margin-bottom: 12px; }
.form-field label { font-size: 12px; font-weight: 600; color: var(--text2); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
.form-field input {
  width: 100%; padding: 11px 13px;
  background: var(--surface2); border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm); font-size: 16px; color: var(--text);
  font-family: inherit; outline: none; appearance: none;
}
.form-field input:focus { border-color: #4CAF50; box-shadow: 0 0 0 3px rgba(76,175,80,0.15); }
.form-hint { font-size: 12px; color: var(--text3); margin-top: 4px; }
.picker-row { display: flex; gap: 8px; flex-wrap: wrap; }
.emoji-opt, .color-opt {
  width: 38px; height: 38px; border-radius: 10px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border: 2.5px solid transparent; font-size: 20px; background: var(--surface2); flex-shrink: 0;
  transition: border-color 0.15s, transform 0.1s;
}
.emoji-opt.sel, .color-opt.sel { border-color: var(--text); }
.emoji-opt:active, .color-opt:active { transform: scale(0.9); }
.color-opt { border-radius: 50%; }
.save-btn {
  width: 100%; padding: 14px; background: var(--text); color: var(--bg);
  border: none; border-radius: var(--radius-sm); font-size: 16px; font-weight: 700;
  cursor: pointer; margin-top: 6px; font-family: inherit; transition: opacity 0.15s;
}
.save-btn:active { opacity: 0.75; }
</style>
</head>
<body>

<!-- TODAY -->
<div class="view active" id="view-today">
  <div class="today-header">
    <div class="date-line" id="date-line"></div>
    <div class="quick-entry-wrap">
      <input class="quick-entry" id="quick-entry" type="text"
        placeholder="e.g. walked, meditated, drank water…"
        autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="quick-send" id="quick-send" onclick="submitQuick()" disabled>↑</button>
    </div>
    <div class="match-chips" id="match-chips"></div>
    <div style="height:10px"></div>
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="progress-label" id="prog-label">0/0</div>
    </div>
  </div>
  <div class="section-label">Today</div>
  <div class="habit-list" id="habit-list"></div>
  <div style="height:8px"></div>
</div>

<!-- CALENDAR -->
<div class="view" id="view-calendar">
  <div class="cal-sticky">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="shiftMonth(-1)">‹</button>
      <h1 id="cal-title"></h1>
      <button class="cal-nav-btn" onclick="shiftMonth(1)">›</button>
    </div>
    <div class="legend" id="cal-legend"></div>
    <div class="dow-row">
      <div class="dow">Su</div><div class="dow">Mo</div><div class="dow">Tu</div>
      <div class="dow">We</div><div class="dow">Th</div><div class="dow">Fr</div><div class="dow">Sa</div>
    </div>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<!-- Sheet (calendar day editor + any future sheets) -->
<div class="sheet-backdrop" id="sheet-backdrop" onclick="closeSheet()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheet-title"></div>
    <div class="sheet-subtitle" id="sheet-subtitle"></div>
    <div id="sheet-body"></div>
  </div>
</div>

<!-- STATS -->
<div class="view" id="view-stats">
  <div class="page-header">
    <h1>Stats</h1>
    <div class="sub" id="stats-sub">Last 30 days</div>
  </div>
  <div class="period-row">
    <button class="period-btn" onclick="setPeriod(7,this)">7 days</button>
    <button class="period-btn active" onclick="setPeriod(30,this)">30 days</button>
    <button class="period-btn" onclick="setPeriod(90,this)">90 days</button>
  </div>
  <div class="stat-grid" id="stat-grid"></div>
  <div class="habit-stats">
    <div class="hs-title">By habit</div>
    <div id="hs-list"></div>
  </div>
  <div style="height:8px"></div>
</div>

<!-- SETTINGS -->
<div class="view" id="view-settings">
  <div class="page-header">
    <h1>My Habits</h1>
    <div class="sub">Tap to reorder or remove</div>
  </div>
  <div class="section-label">Active habits</div>
  <div class="settings-habits" id="settings-list"></div>
  <div class="section-label">Add new habit</div>
  <div class="add-form">
    <div class="form-field">
      <label>Name</label>
      <input id="inp-name" type="text" placeholder="e.g. Read 20 min" maxlength="40" autocomplete="off">
    </div>
    <div class="form-field">
      <label>Note (optional)</label>
      <input id="inp-desc" type="text" placeholder="e.g. Any book counts" maxlength="60" autocomplete="off">
    </div>
    <div class="form-field">
      <label>Keywords <span style="font-weight:400;text-transform:none">(for quick entry)</span></label>
      <input id="inp-keys" type="text" placeholder="e.g. read, book, reading" maxlength="100" autocomplete="off">
      <div class="form-hint">Comma-separated words that match this habit</div>
    </div>
    <div class="form-field">
      <label>Icon</label>
      <div class="picker-row" id="emoji-picker"></div>
    </div>
    <div class="form-field">
      <label>Color</label>
      <div class="picker-row" id="color-picker"></div>
    </div>
    <button class="save-btn" onclick="addHabit()">Add Habit</button>
  </div>
  <div style="height:8px"></div>
</div>

<!-- Nav -->
<nav>
  <button class="active" onclick="gotoView('today',this)">
    <span class="nav-icon">☀️</span>Today
  </button>
  <button onclick="gotoView('calendar',this)">
    <span class="nav-icon">📅</span>Calendar
  </button>
  <button onclick="gotoView('stats',this)">
    <span class="nav-icon">📊</span>Stats
  </button>
  <button onclick="gotoView('settings',this)">
    <span class="nav-icon">✏️</span>Habits
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
const COLORS = ['#4CAF50','#2196F3','#9C27B0','#FF9800','#F44336','#00BCD4','#E91E63','#FF5722','#795548','#607D8B','#3F51B5','#009688'];
const EMOJIS = ['🚶','🏋️','💧','🧘','🌱','📖','😴','🥗','💊','🎯','🎸','✍️','🛁','🌿','❤️','🌟','🏃','🧴','☕','🥦'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

let calY, calM, period = 30, selColor = COLORS[0], selEmoji = EMOJIS[0];

// ── Default keywords per built-in habit ──
const DEFAULT_KEYWORDS = {
  h1: 'walk,walked,walking,steps,stroll,outside,20 min',
  h2: 'pt,physical therapy,exercises,exercise,stretches,stretching,rehab,therapy',
  h3: 'water,stanley,stanleys,hydrated,hydration,drank,drink',
  h4: 'meditate,meditated,meditation,breathe,breathing,mindful,calm,5 min',
  h5: 'seeds,seed,seed cycle,cycling',
  h6: 'squats,squat,30 squats,strength,legs',
};

function load() {
  const saved = JSON.parse(localStorage.getItem('habits_v4') || 'null');
  if (saved) return saved;
  return {
    habits: [
      {id:'h1', name:'Walk 20 min',     desc:'Any outdoor walk', emoji:'🚶', color:'#4CAF50', keywords: DEFAULT_KEYWORDS.h1},
      {id:'h2', name:'PT exercises',     desc:'Full routine',      emoji:'🏋️', color:'#2196F3', keywords: DEFAULT_KEYWORDS.h2},
      {id:'h3', name:'Drink 2 stanleys', desc:'~64 oz water',     emoji:'💧', color:'#00BCD4', keywords: DEFAULT_KEYWORDS.h3},
      {id:'h4', name:'Meditate 5 min',   desc:'Any style',         emoji:'🧘', color:'#9C27B0', keywords: DEFAULT_KEYWORDS.h4},
      {id:'h5', name:'Seed cycle',       desc:'Daily seeds',       emoji:'🌱', color:'#FF9800', keywords: DEFAULT_KEYWORDS.h5},
      {id:'h6', name:'30 squats',        desc:'',                  emoji:'🏃', color:'#F44336', keywords: DEFAULT_KEYWORDS.h6},
    ],
    logs: {}
  };
}
function save(s) { localStorage.setItem('habits_v4', JSON.stringify(s)); }

function dk(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}
function todayKey() { return dk(new Date()); }

function daysBack(n) {
  const keys = [];
  for (let i=0; i<n; i++) { const d=new Date(); d.setDate(d.getDate()-i); keys.push(dk(d)); }
  return keys;
}

function calcStreak(s, id) {
  let count=0;
  const today=new Date();
  for (let i=0; i<365; i++) {
    const d=new Date(today); d.setDate(d.getDate()-i);
    const k=dk(d);
    if (i===0 && !(s.logs[k]||[]).includes(id)) continue;
    if ((s.logs[k]||[]).includes(id)) count++;
    else break;
  }
  return count;
}

// ── Natural language matching ──
function matchHabits(text, habits) {
  const q = text.toLowerCase().trim();
  if (!q) return [];
  const matches = [];
  habits.forEach(h => {
    const sources = [
      h.name.toLowerCase(),
      (h.desc||'').toLowerCase(),
      (h.keywords||'').toLowerCase(),
    ];
    const words = sources.join(' ');
    // keyword list match
    const kws = (h.keywords||'').split(',').map(k=>k.trim().toLowerCase()).filter(Boolean);
    const nameWords = h.name.toLowerCase().split(/\s+/);
    const allTokens = [...kws, ...nameWords];
    const directHit = allTokens.some(tok => tok && (q.includes(tok) || tok.includes(q.split(/\s+/)[0])));
    // fuzzy: any word in query appears in sources
    const queryWords = q.split(/\s+/).filter(w=>w.length>2);
    const fuzzyHit = queryWords.some(w => words.includes(w));
    if (directHit || fuzzyHit) matches.push(h);
  });
  return matches;
}

// pending matches before send
let pendingMatches = [];

function renderMatchChips(matches, done) {
  const el = document.getElementById('match-chips');
  el.innerHTML = '';
  matches.forEach(h => {
    const isDone = done.includes(h.id);
    const btn = document.createElement('button');
    btn.className = 'match-chip' + (isDone?' queued':'');
    btn.style.background = h.color + '20';
    btn.style.color = h.color;
    btn.innerHTML = `${h.emoji} ${h.name}`;
    btn.onclick = () => {
      const s = load();
      const k = todayKey();
      if (!s.logs[k]) s.logs[k] = [];
      const idx = s.logs[k].indexOf(h.id);
      if (idx >= 0) s.logs[k].splice(idx,1);
      else s.logs[k].push(h.id);
      save(s);
      renderToday();
      showToast(idx >= 0 ? `Unchecked ${h.name}` : `✓ ${h.name}`);
    };
    el.appendChild(btn);
  });
}

function submitQuick() {
  const inp = document.getElementById('quick-entry');
  const text = inp.value.trim();
  if (!text) return;
  const s = load();
  const k = todayKey();
  if (!s.logs[k]) s.logs[k] = [];
  const done = s.logs[k];
  const matches = matchHabits(text, s.habits);
  if (matches.length === 0) {
    showToast("No habit matched — try different words");
    return;
  }
  // log all matches that aren't already done
  let added = [];
  matches.forEach(h => {
    if (!done.includes(h.id)) { done.push(h.id); added.push(h); }
  });
  save(s);
  inp.value = '';
  document.getElementById('quick-send').disabled = true;
  renderToday();
  if (added.length) showToast('✓ ' + added.map(h=>h.name).join(', '));
  else showToast('Already logged!');
}

function onQuickInput() {
  const inp = document.getElementById('quick-entry');
  const text = inp.value.trim();
  const btn = document.getElementById('quick-send');
  btn.disabled = !text;
  if (!text) { document.getElementById('match-chips').innerHTML=''; return; }
  const s = load();
  const done = s.logs[todayKey()] || [];
  const matches = matchHabits(text, s.habits);
  renderMatchChips(matches, done);
}

// ── Toast ──
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── View routing ──
function gotoView(name, btn) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.getElementById('view-'+name).scrollTop = 0;
  if (btn) btn.classList.add('active');
  closeSheet();
  if (name==='today') renderToday();
  if (name==='calendar') renderCalendar();
  if (name==='stats') renderStats();
  if (name==='settings') renderSettings();
}

// ── TODAY ──
function renderToday() {
  const s = load();
  const key = todayKey();
  const done = s.logs[key] || [];
  document.getElementById('date-line').textContent =
    new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

  const total = s.habits.length, n = done.length;
  document.getElementById('prog-fill').style.width = total ? `${(n/total)*100}%` : '0%';
  document.getElementById('prog-label').textContent = `${n}/${total}`;

  // refresh chips if still showing
  const chipEl = document.getElementById('match-chips');
  if (chipEl.children.length) {
    const curText = document.getElementById('quick-entry').value.trim();
    if (curText) renderMatchChips(matchHabits(curText, s.habits), done);
  }

  const list = document.getElementById('habit-list');
  list.innerHTML = '';
  s.habits.forEach(hab => {
    const isDone = done.includes(hab.id);
    const str = calcStreak(s, hab.id);
    const el = document.createElement('div');
    el.className = 'habit-item' + (isDone?' done':'');
    el.style.setProperty('--hc', hab.color);
    el.innerHTML = `
      <div class="habit-emoji">${hab.emoji}</div>
      <div class="habit-info">
        <div class="habit-name">${hab.name}</div>
        ${hab.desc?`<div class="habit-desc">${hab.desc}</div>`:''}
      </div>
      <div class="habit-right">
        ${str>0?`<div class="streak${isDone?' hot':''}">${str}🔥</div>`:''}
        <div class="check-ring">${isDone?'✓':''}</div>
      </div>`;
    el.onclick = () => {
      const s2=load(); const k=todayKey();
      if (!s2.logs[k]) s2.logs[k]=[];
      const idx=s2.logs[k].indexOf(hab.id);
      if (idx>=0) s2.logs[k].splice(idx,1); else s2.logs[k].push(hab.id);
      save(s2);
      el.classList.add('popping');
      el.addEventListener('animationend',()=>el.classList.remove('popping'),{once:true});
      renderToday();
    };
    list.appendChild(el);
  });
}

// ── CALENDAR ──
function renderCalendar() {
  const now = new Date();
  if (calY===undefined) { calY=now.getFullYear(); calM=now.getMonth(); }
  const s = load();
  document.getElementById('cal-title').textContent = `${MONTHS[calM]} ${calY}`;

  document.getElementById('cal-legend').innerHTML = s.habits.map(h=>
    `<div class="legend-item"><div class="legend-dot" style="background:${h.color}"></div>${h.name}</div>`
  ).join('');

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  const firstDow = new Date(calY,calM,1).getDay();
  const lastDay = new Date(calY,calM+1,0).getDate();
  const todayStr = todayKey();

  for (let i=0;i<firstDow;i++) {
    const b=document.createElement('div'); b.className='cal-day empty'; grid.appendChild(b);
  }

  for (let d=1; d<=lastDay; d++) {
    const dateObj = new Date(calY,calM,d);
    const k = dk(dateObj);
    const done = s.logs[k] || [];
    const isFuture = dateObj > now && k !== todayStr;
    const cell = document.createElement('div');
    cell.className = 'cal-day'+(k===todayStr?' today':'')+(isFuture?' future':'');

    const num = document.createElement('div');
    num.className = 'day-num'; num.textContent = d;
    cell.appendChild(num);

    if (done.length) {
      const dotsEl = document.createElement('div');
      dotsEl.className = 'day-dots';
      done.forEach(id => {
        const h = s.habits.find(h=>h.id===id);
        if (!h) return;
        const dot = document.createElement('div');
        dot.className = 'dot'; dot.style.background = h.color;
        dotsEl.appendChild(dot);
      });
      cell.appendChild(dotsEl);
    }

    cell.onclick = () => openDaySheet(calY, calM, d);
    grid.appendChild(cell);
  }
}

function shiftMonth(d) {
  calM+=d;
  if (calM>11){calM=0;calY++;} if (calM<0){calM=11;calY--;}
  renderCalendar(); closeSheet();
}

// Editable day sheet
function openDaySheet(y, m, d) {
  const s = load();
  const k = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const dateObj = new Date(y,m,d);
  const isToday = k === todayKey();

  document.getElementById('sheet-title').textContent =
    dateObj.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  document.getElementById('sheet-subtitle').textContent =
    isToday ? 'Today — tap to toggle' : 'Tap any habit to add or remove';

  renderSheetBody(k, s);
  document.getElementById('sheet-backdrop').classList.add('open');
}

function renderSheetBody(k, s) {
  const done = s.logs[k] || [];
  const body = document.getElementById('sheet-body');
  body.innerHTML = '';
  s.habits.forEach(h => {
    const isDone = done.includes(h.id);
    const row = document.createElement('div');
    row.className = 'sheet-habit-row' + (isDone?' done':'');
    row.style.setProperty('--hc', h.color);
    row.innerHTML = `
      <div class="shr-emoji">${h.emoji}</div>
      <div class="shr-name">${h.name}</div>
      <div class="shr-check">${isDone?'✓':''}</div>`;
    row.onclick = () => {
      const s2 = load();
      if (!s2.logs[k]) s2.logs[k] = [];
      const idx = s2.logs[k].indexOf(h.id);
      if (idx>=0) s2.logs[k].splice(idx,1); else s2.logs[k].push(h.id);
      save(s2);
      renderSheetBody(k, s2);
      renderCalendar();
      if (k === todayKey()) renderToday();
    };
    body.appendChild(row);
  });
}

function closeSheet() { document.getElementById('sheet-backdrop').classList.remove('open'); }

// ── STATS ──
function setPeriod(n, btn) {
  period=n;
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('stats-sub').textContent=`Last ${n} days`;
  renderStats();
}

function renderStats() {
  const s=load(), keys=daysBack(period);
  let totalDone=0,totalPoss=0,perfectDays=0,streakCount=0,inStreak=true;
  keys.forEach(k=>{
    const n=(s.logs[k]||[]).length;
    totalDone+=n; totalPoss+=s.habits.length;
    if(s.habits.length>0&&n===s.habits.length) perfectDays++;
    if(inStreak&&n===s.habits.length&&s.habits.length>0) streakCount++;
    else inStreak=false;
  });
  const pct=totalPoss>0?Math.round((totalDone/totalPoss)*100):0;
  document.getElementById('stat-grid').innerHTML=`
    <div class="stat-card"><div class="stat-lbl">Completion</div><div class="stat-val">${pct}%</div><div class="stat-sub">last ${period} days</div></div>
    <div class="stat-card"><div class="stat-lbl">Perfect days</div><div class="stat-val">${perfectDays}</div><div class="stat-sub">all habits done</div></div>
    <div class="stat-card"><div class="stat-lbl">Check-ins</div><div class="stat-val">${totalDone}</div><div class="stat-sub">total</div></div>
    <div class="stat-card"><div class="stat-lbl">Current streak</div><div class="stat-val">${streakCount}</div><div class="stat-sub">perfect days</div></div>
  `;
  const list=document.getElementById('hs-list'); list.innerHTML='';
  s.habits.forEach(h=>{
    const done=keys.filter(k=>(s.logs[k]||[]).includes(h.id)).length;
    const p=period>0?Math.round((done/period)*100):0;
    const div=document.createElement('div'); div.className='hs-row';
    div.innerHTML=`
      <div class="hs-emoji">${h.emoji}</div>
      <div class="hs-info">
        <div class="hs-name">${h.name}</div>
        <div class="hs-bar-track"><div class="hs-bar" style="width:${p}%;background:${h.color}"></div></div>
      </div>
      <div class="hs-pct" style="color:${h.color}">${p}%</div>`;
    list.appendChild(div);
  });
}

// ── SETTINGS ──
function renderSettings() {
  const s=load();
  const list=document.getElementById('settings-list'); list.innerHTML='';
  s.habits.forEach((h,i)=>{
    const div=document.createElement('div'); div.className='sh-item';
    div.innerHTML=`
      <div class="sh-swatch" style="background:${h.color}"></div>
      <div class="sh-text">
        <div class="sh-name">${h.emoji} ${h.name}</div>
        ${h.desc?`<div class="sh-desc">${h.desc}</div>`:''}
        ${h.keywords?`<div class="sh-keywords">🔤 ${h.keywords}</div>`:''}
      </div>
      <div class="sh-btns">
        ${i>0?`<button class="sh-btn" onclick="moveH('${h.id}',-1)">↑</button>`:'<div style="width:30px"></div>'}
        ${i<s.habits.length-1?`<button class="sh-btn" onclick="moveH('${h.id}',1)">↓</button>`:'<div style="width:30px"></div>'}
        <button class="sh-btn del" onclick="delH('${h.id}')">✕</button>
      </div>`;
    list.appendChild(div);
  });

  const ep=document.getElementById('emoji-picker'); ep.innerHTML='';
  EMOJIS.forEach(e=>{
    const b=document.createElement('div'); b.className='emoji-opt'+(e===selEmoji?' sel':'');
    b.textContent=e; b.onclick=()=>{selEmoji=e;renderSettings();}; ep.appendChild(b);
  });
  const cp=document.getElementById('color-picker'); cp.innerHTML='';
  COLORS.forEach(c=>{
    const b=document.createElement('div'); b.className='color-opt'+(c===selColor?' sel':'');
    b.style.background=c; b.onclick=()=>{selColor=c;renderSettings();}; cp.appendChild(b);
  });
}

function addHabit() {
  const name=document.getElementById('inp-name').value.trim();
  if(!name){document.getElementById('inp-name').focus();return;}
  const s=load();
  s.habits.push({
    id:'h'+Date.now(), name,
    desc: document.getElementById('inp-desc').value.trim(),
    keywords: document.getElementById('inp-keys').value.trim(),
    emoji: selEmoji, color: selColor
  });
  save(s);
  document.getElementById('inp-name').value='';
  document.getElementById('inp-desc').value='';
  document.getElementById('inp-keys').value='';
  renderSettings();
}

function delH(id) { const s=load(); s.habits=s.habits.filter(h=>h.id!==id); save(s); renderSettings(); }
function moveH(id,d) {
  const s=load(); const i=s.habits.findIndex(h=>h.id===id); const j=i+d;
  if(j<0||j>=s.habits.length)return;
  [s.habits[i],s.habits[j]]=[s.habits[j],s.habits[i]]; save(s); renderSettings();
}

// ── Wire up quick entry ──
document.getElementById('quick-entry').addEventListener('input', onQuickInput);
document.getElementById('quick-entry').addEventListener('keydown', e => {
  if (e.key==='Enter') submitQuick();
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

renderToday();
</script>
